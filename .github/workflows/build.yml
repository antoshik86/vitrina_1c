name: Build & Test EPF
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install v8unpack
      - run: python build_epf.py ${{ github.workspace }}
      - uses: actions/upload-artifact@v4
        with:
          name: epf-files
          path: |
            vitrina_export.epf
            test_runner.epf

  test:
    runs-on: windows-latest
    needs: build
    if: false  # заменить на windows-1c при наличии self-hosted runner с 1С
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: epf-files
      - run: .\run_tests.ps1